<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ornn</title>
    <link rel="preload" href="assets/fonts/Kenney Mini.ttf" as="font" type="font/ttf" crossorigin>
    <style>
        @font-face {
            font-family: 'Kenney Mini';
            src: url('assets/fonts/Kenney%20Mini.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        canvas#game {
            display: block;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -moz-crisp-edges;
            background: #000;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script type="module" src="src/main.js"></script>
</body>
</html>
